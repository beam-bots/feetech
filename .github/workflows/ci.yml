name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  security-events: write
  pages: write
  id-token: write

jobs:
  CI:
    uses: beam-bots/.github/.github/workflows/elixir-ci.yml@dfa4225cc80d40272e764eb9a0380229f853b767 # main
    with:
      enable-docs-deploy: true
      enable-release: true
    secrets:
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
